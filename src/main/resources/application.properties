spring.application.name=sms-forwarder-render
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.api.key=${APP_API_KEY}
app.mail.provider=${APP_MAIL_PROVIDER:resend}
app.mail.api-key=${RESEND_API_KEY}
app.mail.from=${APP_MAIL_FROM}
app.mail.to=${APP_MAIL_TO}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Reintentos de correo: cada 5 segundos revisa pendientes; si falla, reintenta a los 30 segundos.
app.email.retry.fixed-delay-ms=${APP_EMAIL_RETRY_FIXED_DELAY_MS:5000}
