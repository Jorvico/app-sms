server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: sms-forwarder-render
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sms_forwarder}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    api-key: ${APP_API_KEY:change-me}
  notification:
    to: ${APP_NOTIFICATION_TO:}
    from: ${APP_NOTIFICATION_FROM:${SPRING_MAIL_USERNAME:}}
  classifier:
    default-timezone: America/Bogota
